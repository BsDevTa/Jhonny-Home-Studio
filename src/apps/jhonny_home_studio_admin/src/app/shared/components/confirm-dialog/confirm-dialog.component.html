@if (open()) {
  <div class="dialog-backdrop" role="presentation" (click)="canceled.emit()">
    <section class="dialog surface" role="dialog" aria-modal="true" (click)="$event.stopPropagation()">
      <h2>{{ title() }}</h2>
      <p>{{ description() }}</p>
      <div class="dialog__actions">
        <button type="button" class="secondary-button" (click)="canceled.emit()">Voltar</button>
        <button type="button" class="danger-button" (click)="confirmed.emit()">{{ confirmLabel() }}</button>
      </div>
    </section>
  </div>
}
