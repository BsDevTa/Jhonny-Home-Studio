<section class="page">
  <header class="page-header">
    <div>
      <h1 class="page-title">{{ editing ? 'Editar categoria' : 'Nova categoria' }}</h1>
      <p class="page-subtitle">Mantenha o catálogo organizado e fácil de navegar.</p>
    </div>
  </header>

  @if (loading()) {
    <app-loading />
  } @else {
    <form class="surface form-card" [formGroup]="form" (ngSubmit)="submit()">
      @if (error()) {
        <p class="error-banner">{{ error() }}</p>
      }

      <div class="form-grid">
        <div class="field span-2">
          <label for="name">Nome</label>
          <input id="name" type="text" formControlName="name" placeholder="Ex.: Tratamentos" />
          @if (form.controls.name.touched && form.controls.name.invalid) {
            <span class="field-error">Informe o nome da categoria.</span>
          }
        </div>

        <div class="field span-2">
          <label for="description">Descrição</label>
          <textarea id="description" formControlName="description" placeholder="Descrição breve e elegante para a categoria."></textarea>
        </div>

        @if (editing) {
          <label class="checkbox-field span-2">
            <input type="checkbox" formControlName="isActive" />
            Categoria ativa
          </label>
        }
      </div>

      <div class="form-actions">
        <a routerLink="/categories" class="secondary-button">Cancelar</a>
        <button type="submit" class="primary-button" [disabled]="saving()">
          {{ saving() ? 'Salvando...' : 'Salvar categoria' }}
        </button>
      </div>
    </form>
  }
</section>
